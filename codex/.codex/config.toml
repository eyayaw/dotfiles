# Claude Code-like: reads run freely in the read-only sandbox; any mutation
# (file writes, git ops, network) fails there, the model requests escalation,
# you get prompted, and approved commands run unsandboxed so they actually
# work. NOT "untrusted": that policy forbids escalation requests entirely
# ("you cannot ask for escalated permissions if the approval policy is
# UnlessTrusted"), so approved git ops still died on read-only .git.
# rules/default.rules layers on top: allow = run outside the sandbox silently
# (gh/git reads, pytest); prompt = always ask (push, PR/issue mutations).
approval_policy = "on-request"
sandbox_mode    = "read-only"
approvals_reviewer = "user"    # you do the approving, not auto-review

model_reasoning_effort = "high"
notifications = true
require_git = true
model = "gpt-5.6-sol"

notify = ["/Users/eyayaw/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[features]
hooks = true
memories = true
# snapshot wraps every command in `/bin/zsh -lc '...'`, which execpolicy can't
# parse -> trusted set and rules never match, everything prompts
shell_snapshot = false

[memories]
generate_memories = true
use_memories = true

[desktop]
followUpQueueMode = "queue"
mac-menu-bar-enabled = false
dock-icon-preference = "codex-system"

[desktop.open-in-target-preferences]
global = "zed"


[sandbox_workspace_write]
network_access = true # allow gh/curl etc. inside the sandbox

